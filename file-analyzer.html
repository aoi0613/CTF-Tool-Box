<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ファイル解析ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .input-group { margin-bottom: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
        .result-box { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 5px; }
        ul { list-style-type: none; padding-left: 0; }
        li { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
        .error { color: red; font-weight: bold; margin-top: 10px; }

        /* ナビゲーションのスタイル */
        .nav-menu { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .nav-menu a { color: white; text-decoration: none; margin-right: 15px; font-weight: bold; }
        .nav-menu a:hover { text-decoration: underline; }
        .nav-menu span { color: #aaa; margin-right: 15px; } /* 現在のページ用 */
    </style>
</head>
<body>
    <nav class="nav-menu">
        <a href="index.html">暗号解読ツールへ</a>
        <span>▶ ファイル解析</span>
    </nav>

    <h2>ファイル解析ツール</h2>
    
    <div class="input-group">
        <label for="fileInput"><b>解析したいファイルを選択してください:</b></label><br><br>
        <input type="file" id="fileInput">
        <div id="errorMessage" class="error"></div>
    </div>

    <div class="result-box" id="resultBox" style="display: none;">
        <h3>解析結果 (基本メタデータ)</h3>
        <ul id="metadataList"></ul>
    </div>

    <script src="file-analyzer.js"></script>
</body>
</html>
