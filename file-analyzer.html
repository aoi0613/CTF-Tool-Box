<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ファイル解析ツール</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .input-group { margin-bottom: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
        .result-box { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 5px; }
        ul { list-style-type: none; padding-left: 0; }
        li { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
        .error { color: red; font-weight: bold; margin-top: 10px; }

        /* ナビゲーションのスタイル */
        .nav-menu { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .nav-menu a { color: white; text-decoration: none; margin-right: 15px; font-weight: bold; }
        .nav-menu a:hover { text-decoration: underline; }
        .nav-menu span { color: #aaa; margin-right: 15px; font-weight: bold; } 

        .drop-zone {
            border: 2px dashed #007bff;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            color: #555;
            background-color: #fafafa;
            transition: background-color 0.3s, border-color 0.3s;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .drop-zone.dragover {
            background-color: #e9f5ff;
            border-color: #0056b3;
            color: #0056b3;
        }

        .alert-badge {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.95em;
        }
        .badge-success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .badge-warning { background-color: #fff3cd; border: 1px solid #ffeeba; color: #856404; animation: blink 2s infinite; }
        .badge-info { background-color: #e2e3e5; border: 1px solid #d6d8db; color: #383d41; }

        @keyframes blink {
            0% { border-color: #ffeeba; }
            50% { border-color: #ffc107; box-shadow: 0 0 5px rgba(255,193,7,0.5); }
            100% { border-color: #ffeeba; }
        }

        .strings-controls { display: flex; gap: 10px; margin-bottom: 8px; }
        .strings-search { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; }
        .strings-btn { padding: 8px 15px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9em; }
        .strings-btn:hover { background-color: #5a6268; }
        
        textarea { width: 100%; font-family: monospace; font-size: 0.9em; padding: 10px; background: #fafafa; border: 1px solid #ccc; border-radius: 4px; resize: vertical; box-sizing: border-box; }
        
        .section-header { margin: 25px 0 10px 0; border-top: 2px solid #6c757d; padding-top: 15px; color: #333; }
    </style>
</head>
<body>
    <nav class="nav-menu">
        <a href="De-En-code.html">暗号解読・変換</a>
        <span>▶ ファイル解析</span>
        <a href="hash-tool.html">ハッシュ生成・変換</a>
        <a href="terminal-tool.html">Webターミナル</a>
    </nav>

    <h2>ファイル解析ツール</h2>
    
    <div class="input-group">
        <label><b>解析したいファイルをドロップ、または選択してください:</b></label>
        
        <div id="dropZone" class="drop-zone">
            ここにファイルをドロップ<br><br>
            または<br><br>
            <input type="file" id="fileInput">
        </div>

        <div id="errorMessage" class="error"></div>
    </div>

    <div class="result-box" id="resultBox" style="display: none;">
        <h3>解析結果 (メタデータ)</h3>
        
        <div id="signatureAlert"></div>
        <ul id="metadataList"></ul>

        <div id="imageAnalysisSection" style="display: none;">
            <h4 class="section-header" style="border-top-color: #9c27b0; color: #9c27b0;">ステガノグラフィ解析 (最下位ビット LSB抽出)</h4>
            <div style="font-size: 0.85em; color: #666; margin-bottom: 8px;">ピクセルのRGB値の最下位ビットに隠された文字列を抽出します。</div>
            <textarea id="stegoTextArea" readonly placeholder="解析中..." style="height: 120px;"></textarea>

            <h4 class="section-header" style="border-top-color: #17a2b8; color: #17a2b8;">画像内の文字抽出 (OCR)</h4>
            <div style="font-size: 0.85em; color: #666; margin-bottom: 8px;">画像内に書き込まれたテキスト（英語・日本語）を抽出します。</div>
            <textarea id="ocrTextArea" readonly placeholder="解析中... (数秒かかる場合があります)" style="height: 120px;"></textarea>
        </div>

        <div id="stringsSection" class="section-header">
            <h4 style="color: #6c757d; margin: 0 0 10px 0;">文字列抽出 (Strings)</h4>
            <div id="stringsNotice" style="font-size: 0.85em; color: #666; margin-bottom: 8px; font-style: italic;"></div>
            
            <div id="stringsInputGroup" style="display: none;">
                <div class="strings-controls">
                    <input type="text" id="stringsSearch" class="strings-search" placeholder="キーワードで絞り込み (例: flag, ctf, { )">
                    <button id="copyStringsBtn" class="strings-btn">すべてコピー</button>
                </div>
                <div style="font-size: 0.85em; color: #555; margin-bottom: 8px;">
                    表示件数: <span id="stringsCount" style="font-weight: bold;">0</span> 件
                </div>
            </div>
            <textarea id="stringsTextArea" readonly placeholder="解析中..." style="height: 250px;"></textarea>
        </div>
    </div>

    <script src="file-analyzer.js"></script>
</body>
</html>
