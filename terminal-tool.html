<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webターミナル (CTF Shell)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        .input-group { margin-bottom: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
        .error-text { color: red; font-weight: bold; margin-top: 10px; }
        
        /* ターミナルのコンテナ */
        #terminal-container {
            width: 100%;
            height: 400px;
            background-color: #000;
            padding: 10px;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* ナビゲーションのスタイル */
        .nav-menu { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .nav-menu a { color: white; text-decoration: none; margin-right: 15px; font-weight: bold; }
        .nav-menu a:hover { text-decoration: underline; }
        .nav-menu span { color: #aaa; margin-right: 15px; } 
    </style>
</head>
<body>
    <nav class="nav-menu">
        <a href="index.html">暗号解読ツール</a>
        <a href="file-analyzer.html">ファイル解析ツール</a>
        <a href="hash-tool.html">ハッシュ生成・変換</a>
        <span>▶ Webターミナル</span>
    </nav>

    <h2>Webターミナル (CTF Shell)</h2>
    
    <div class="input-group">
        <label><b>解析対象のファイルをアップロード:</b></label><br>
        <input type="file" id="fileInput" style="margin-top: 10px;">
        <div id="fileError" class="error-text"></div>
    </div>

    <div id="terminal-container"></div>

    <script src="terminal-tool.js"></script>
</body>
</html>
