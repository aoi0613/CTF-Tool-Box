<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハッシュ生成・データ変換ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        .input-group { margin-bottom: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; font-family: monospace; padding: 8px; box-sizing: border-box; }
        
        /* ボタンスタイル */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 5px; }
        .btn-action { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; color: white; font-size: 0.9em; }
        .btn-text { background: #007bff; }
        .btn-text:hover { background: #0056b3; }
        .btn-hex { background: #6f42c1; }
        .btn-hex:hover { background: #59339d; }
        .btn-bin { background: #17a2b8; }
        .btn-bin:hover { background: #117a8b; }
        
        .result-box { margin-bottom: 20px; border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
        .result-box h3 { margin-top: 0; font-size: 1.1em; display: flex; justify-content: space-between; align-items: center; }
        .result-box textarea { height: 40px; background: #fafafa; margin-bottom: 0; }
        .copy-btn { padding: 4px 10px; font-size: 0.9em; background: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .copy-btn:hover { background: #1e7e34; }
        .error-text { color: red; font-weight: bold; margin-top: 5px; }

        /* ファイルドロップエリア */
        .file-drop-zone { border: 2px dashed #28a745; padding: 30px 20px; text-align: center; border-radius: 8px; background: #f8fff9; transition: background 0.3s; color: #555; }
        .file-drop-zone.dragover { background: #d4edda; border-color: #155724; color: #155724; }
        #fileHashProgress { display: none; color: #28a745; font-weight: bold; margin-top: 10px; text-align: center;}
        
        /* 復元テキスト表示用 */
        #decodedTextContainer { display: none; border: 2px solid #ffc107; background: #fffdf5; }
        #decodedTextContainer h3 { color: #856404; }
        #decodedTextContainer textarea { background: #fff; height: 60px; }

        /* ナビゲーションのスタイル */
        .nav-menu { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .nav-menu a { color: white; text-decoration: none; margin-right: 15px; font-weight: bold; }
        .nav-menu a:hover { text-decoration: underline; }
        .nav-menu span { color: #aaa; margin-right: 15px; font-weight: bold; } 
    </style>
</head>
<body>
    <nav class="nav-menu">
        <a href="De-En-code.html">暗号解読・変換</a>
        <a href="file-analyzer.html">ファイル解析</a>
        <span>▶ ハッシュ生成・変換</span>
        <a href="terminal-tool.html">Webターミナル</a>
    </nav>

    <h2>ハッシュ生成・データ変換ツール</h2>
    
    <div class="input-group">
        <label><b>処理したいテキスト（またはHex / Binary）を入力:</b></label>
        <textarea id="inputText" maxlength="10000" placeholder="テキスト、または 48656C6C6F などのHex、01001000... などの2進数を入力"></textarea>
        
        <div class="btn-group">
            <button class="btn-action btn-text" onclick="processText()">テキストとしてハッシュ化・変換</button>
            <button class="btn-action btn-hex" onclick="decodeFromHex()">Hex (16進数) からデコード</button>
            <button class="btn-action btn-bin" onclick="decodeFromBin()">Binary (2進数) からデコード</button>
        </div>
        <div id="globalError" class="error-text"></div>
    </div>

    <div class="input-group">
        <label><b>ファイルのハッシュ計算 (MD5, SHA-1, SHA-256):</b></label>
        <div id="fileDropZone" class="file-drop-zone">
            ここにファイルをドロップ<br><br>
            または<br><br>
            <input type="file" id="fileInput" style="display:none;">
            <button class="btn-action" style="background: #28a745;" onclick="document.getElementById('fileInput').click()">ファイルを選択</button>
        </div>
        <div id="fileHashProgress">ファイルを読み込み・ハッシュ計算中...</div>
        <div id="fileInfo" style="margin-top: 10px; font-size: 0.9em; color: #333; font-weight: bold; text-align: center;"></div>
    </div>

    <div id="results">
        <div class="result-box" id="decodedTextContainer">
            <h3>復元されたテキスト (平文) <button class="copy-btn" onclick="copyResult('out-decoded-text')">コピー</button></h3>
            <textarea id="out-decoded-text" readonly></textarea>
        </div>
        
        <div class="result-box">
            <h3>MD5 ハッシュ <button class="copy-btn" onclick="copyResult('out-md5')">コピー</button></h3>
            <textarea id="out-md5" readonly></textarea>
        </div>
        <div class="result-box">
            <h3>SHA-1 ハッシュ <button class="copy-btn" onclick="copyResult('out-sha1')">コピー</button></h3>
            <textarea id="out-sha1" readonly></textarea>
        </div>
        <div class="result-box">
            <h3>SHA-256 ハッシュ <button class="copy-btn" onclick="copyResult('out-sha256')">コピー</button></h3>
            <textarea id="out-sha256" readonly></textarea>
        </div>
        
        <div id="hexBinGroup">
            <div class="result-box">
                <h3>Hex (16進数) <button class="copy-btn" onclick="copyResult('out-hex')">コピー</button></h3>
                <textarea id="out-hex" readonly></textarea>
            </div>
            <div class="result-box">
                <h3>Binary (2進数) <button class="copy-btn" onclick="copyResult('out-bin')">コピー</button></h3>
                <textarea id="out-bin" readonly></textarea>
            </div>
        </div>
    </div>
    
    <script src="hash-tool.js"></script>
</body>
</html>
